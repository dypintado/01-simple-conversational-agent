<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Agent — Dylan Pintado</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0a;
      color: #f0f0f0;
      font-family: 'Segoe UI', sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .container {
      width: 100%;
      max-width: 720px;
      height: 90vh;
      display: flex;
      flex-direction: column;
      padding: 20px;
    }

    .header {
      text-align: center;
      margin-bottom: 24px;
    }

    .header h1 {
      font-size: 1.4rem;
      font-weight: 600;
      color: #ffffff;
    }

    .header p {
      font-size: 0.85rem;
      color: #666;
      margin-top: 4px;
    }

    .chat-box {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 16px;
      background: #111;
      border-radius: 12px;
      border: 1px solid #222;
    }

    .message {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 0.92rem;
      line-height: 1.5;
    }

    .message.user {
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      align-self: flex-end;
      color: #c9d1ff;
    }

    .message.ai {
      background: #141414;
      border: 1px solid #2a2a2a;
      align-self: flex-start;
      color: #e0e0e0;
    }

    .message.typing {
      color: #555;
      font-style: italic;
    }

    .input-row {
      display: flex;
      gap: 10px;
      margin-top: 16px;
    }

    input {
      flex: 1;
      padding: 14px 18px;
      background: #111;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      color: #f0f0f0;
      font-size: 0.92rem;
      outline: none;
      transition: border 0.2s;
    }

    input:focus {
      border-color: #4a4aff;
    }

    button {
      padding: 14px 22px;
      background: #4a4aff;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 0.92rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover { background: #3a3aee; }
    button:disabled { background: #2a2a2a; cursor: not-allowed; }

    .footer {
      text-align: center;
      margin-top: 12px;
      font-size: 0.75rem;
      color: #333;
    }

    .footer a {
      color: #4a4aff;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Simple Conversational Agent</h1>
      <p>Built by Dylan Pintado · Context-aware · Remembers your conversation</p>
    </div>

    <div class="chat-box" id="chatBox">
      <div class="message ai">Hey! I'm your AI assistant. Ask me anything — I'll remember what we talk about.</div>
    </div>

    <div class="input-row">
      <input type="text" id="userInput" placeholder="Type a message..." />
      <button id="sendBtn" onclick="sendMessage()">Send</button>
    </div>

    <div class="footer">
      Agent #01 · <a href="https://dylanpintado.com" target="_blank">dylanpintado.com</a>
    </div>
  </div>

  <script>
    const API_URL = "https://01-simple-conversational-agent-production.up.railway.app/chat";
    const SESSION_ID = "user_" + Math.random().toString(36).substr(2, 9);

    const chatBox = document.getElementById("chatBox");
    const userInput = document.getElementById("userInput");
    const sendBtn = document.getElementById("sendBtn");

    userInput.addEventListener("keydown", function(e) {
      if (e.key === "Enter") sendMessage();
    });

    function appendMessage(text, role) {
      const div = document.createElement("div");
      div.className = "message " + role;
      div.textContent = text;
      chatBox.appendChild(div);
      chatBox.scrollTop = chatBox.scrollHeight;
      return div;
    }

    async function sendMessage() {
      const text = userInput.value.trim();
      if (!text) return;

      userInput.value = "";
      sendBtn.disabled = true;
      appendMessage(text, "user");

     const typing = appendMessage("Thinking...", "ai-typing");

      try {
        const res = await fetch(API_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: text, session_id: SESSION_ID })
        });

        const data = await res.json();
        typing.remove();
        appendMessage(data.response, "ai");
      } catch (err) {
        typing.remove();
        appendMessage("Something went wrong. Please try again.", "ai");
      }

      sendBtn.disabled = false;
      userInput.focus();
    }
  </script>
</body>
</html>
